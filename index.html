<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors Game</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <p>Rock Paper Scissors Game</p>
      <button class="move-button" onclick="playGame('rock')">
        <img class="move-icon" src="images/rock-emoji.png" alt="rock-emoji">
      </button>
      <button class="move-button" onclick="playGame('paper')">
        <img class="move-icon" src="images/paper-emoji.png" alt="paper-emoji">
      </button>
      <button class="move-button" onclick="playGame('scissors')">
        <img class="move-icon" src="images/scissors-emoji.png" alt="scissors-emoji">
      </button>
  
    <p class="js-result"></p>
  
    <p class="js-move"></p>

    <p class="js-score"></p>

    <p class="js-game-count"></p>

    <p class="js-win-percentage"></p>

    <button onclick="resetButton();">Reset Score</button>

  <script src="script/script.js"></script>
</body>
</html>
